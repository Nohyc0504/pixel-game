<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Attack & Defend</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0d1117; font-family:'Segoe UI',Arial,sans-serif;
  overflow:hidden; width:100vw; height:100vh;
  display:flex; align-items:center; justify-content:center; color:#fff;
}
#app { width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; position:relative; }

.screen { display:none; position:absolute; inset:0; align-items:center; justify-content:center; flex-direction:column; background:#0d1117; }
.screen.active { display:flex; }

#titleScreen h1 { font-size:clamp(24px,5vw,50px); font-weight:900; letter-spacing:4px; text-transform:uppercase; color:#e8e0c8; text-shadow:0 0 30px rgba(100,180,255,.4); margin-bottom:10px; }
#titleScreen p { color:#7788aa; font-size:clamp(11px,2vw,14px); margin-bottom:44px; letter-spacing:2px; }
.role-buttons { display:flex; gap:20px; flex-wrap:wrap; justify-content:center; }
.role-btn { padding:18px 34px; border:none; border-radius:12px; font-size:clamp(13px,2vw,17px); font-weight:700; cursor:pointer; text-transform:uppercase; letter-spacing:2px; transition:all .15s; min-width:150px; }
.role-btn:active { transform:scale(.95); }
.attacker-btn { background:linear-gradient(135deg,#b03020,#e74c3c); color:#fff; box-shadow:0 6px 24px rgba(231,76,60,.4); }
.attacker-btn:hover { box-shadow:0 8px 32px rgba(231,76,60,.6); transform:translateY(-2px); }
.defender-btn { background:linear-gradient(135deg,#155a9a,#2980b9); color:#fff; box-shadow:0 6px 24px rgba(41,128,185,.4); }
.defender-btn:hover { box-shadow:0 8px 32px rgba(41,128,185,.6); transform:translateY(-2px); }

#waitingScreen .role-badge { font-size:clamp(18px,3.5vw,30px); font-weight:800; letter-spacing:3px; margin-bottom:20px; }
.attacker-color { color:#e74c3c; }
.defender-color { color:#3498db; }
.spinner { width:54px; height:54px; border:4px solid rgba(255,255,255,.1); border-top-color:#64b4ff; border-radius:50%; animation:spin .9s linear infinite; margin:26px auto; }
@keyframes spin { to { transform:rotate(360deg); } }
#waitingScreen p { color:#7788aa; font-size:13px; letter-spacing:1px; }

#gameScreen { background:#0d1117; }
#gameContainer { position:relative; }
#gameCanvas { display:block; image-rendering:pixelated; }

#hud { position:absolute; top:0; left:0; right:0; padding:6px 14px; display:flex; align-items:center; justify-content:space-between; background:rgba(0,0,0,.65); backdrop-filter:blur(4px); z-index:10; pointer-events:none; }
#timerEl { font-size:clamp(15px,3.5vw,25px); font-weight:900; letter-spacing:3px; color:#e8e0c8; }
#timerEl.urgent { color:#e74c3c; animation:pulse .5s ease infinite alternate; }
@keyframes pulse { from{opacity:1} to{opacity:.3} }
.hud-info { font-size:11px; color:#7788aa; line-height:1.6; }
.hud-role { font-weight:700; font-size:13px; }
#objHp { color:#f39c12; font-weight:700; }
#defHp { color:#3498db; font-weight:700; }

#dpad { position:fixed; bottom:22px; left:14px; z-index:20; display:none; }
.dpad-grid { display:grid; grid-template-columns:repeat(3,58px); grid-template-rows:repeat(3,58px); gap:3px; }
.dpad-btn { background:rgba(255,255,255,.12); border:2px solid rgba(255,255,255,.2); border-radius:10px; color:#fff; font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; user-select:none; -webkit-user-select:none; touch-action:none; }
.dpad-btn.pressed { background:rgba(255,255,255,.3); }
.dpad-empty { background:transparent; border:none; pointer-events:none; }

#fireBtn { position:fixed; bottom:42px; right:22px; z-index:20; display:none; width:76px; height:76px; border-radius:50%; background:linear-gradient(135deg,#b03020,#e74c3c); border:3px solid rgba(255,255,255,.3); color:#fff; font-size:28px; cursor:pointer; align-items:center; justify-content:center; box-shadow:0 4px 20px rgba(231,76,60,.5); user-select:none; touch-action:none; }
#fireBtn.show { display:flex; }
#fireBtn.ready { box-shadow:0 0 0 4px rgba(255,200,80,.6), 0 4px 20px rgba(231,76,60,.5); }

#resultScreen h2 { font-size:clamp(24px,6vw,54px); font-weight:900; letter-spacing:4px; text-transform:uppercase; margin-bottom:32px; }
.back-btn { padding:13px 36px; background:rgba(255,255,255,.1); border:2px solid rgba(255,255,255,.25); border-radius:10px; color:#fff; font-size:14px; font-weight:700; cursor:pointer; letter-spacing:2px; text-transform:uppercase; transition:all .15s; }
.back-btn:hover { background:rgba(255,255,255,.2); }
.back-btn:active { transform:scale(.95); }

#statusMsg { position:fixed; top:56px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,.85); padding:8px 20px; border-radius:16px; font-weight:700; font-size:13px; pointer-events:none; opacity:0; transition:opacity .3s; z-index:100; white-space:nowrap; }
#statusMsg.show { opacity:1; }

@media(max-width:700px) { #dpad { display:block; } }
</style>
</head>
<body>
<div id="app">

<div id="titleScreen" class="screen active">
  <h1>⚔ Attack &amp; Defend</h1>
  <p>진영을 선택하고 상대를 기다리세요</p>
  <div class="role-buttons">
    <button class="role-btn attacker-btn" onclick="chooseRole('attacker')">⚔ 공격 진영</button>
    <button class="role-btn defender-btn"  onclick="chooseRole('defender')">🛡 방어 진영</button>
  </div>
</div>

<div id="waitingScreen" class="screen">
  <div class="role-badge" id="waitBadge"></div>
  <div class="spinner"></div>
  <p>상대방을 기다리는 중...</p>
  <button class="back-btn" style="margin-top:26px" onclick="cancelWaiting()">취소</button>
</div>

<div id="gameScreen" class="screen">
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="hud">
      <div>
        <div class="hud-role" id="hudRole"></div>
        <div class="hud-info" id="hudExtra"></div>
      </div>
      <div id="timerEl">2:30</div>
      <div style="text-align:right">
        <div class="hud-info">목표 <span id="objHp">5</span>/5</div>
        <div class="hud-info">수비HP <span id="defHp">10</span>/10</div>
      </div>
    </div>
  </div>
  <div id="dpad">
    <div class="dpad-grid">
      <div class="dpad-empty"></div>
      <button class="dpad-btn" data-dir="up">▲</button>
      <div class="dpad-empty"></div>
      <button class="dpad-btn" data-dir="left">◀</button>
      <div class="dpad-empty"></div>
      <button class="dpad-btn" data-dir="right">▶</button>
      <div class="dpad-empty"></div>
      <button class="dpad-btn" data-dir="down">▼</button>
      <div class="dpad-empty"></div>
    </div>
  </div>
  <button id="fireBtn">🏹</button>
</div>

<div id="resultScreen" class="screen">
  <h2 id="resultTitle"></h2>
  <button class="back-btn" onclick="goTitle()">← 처음으로</button>
</div>

<div id="statusMsg"></div>
</div>
<script>
// ════════════════════════════════════════════
// FIREBASE
// ════════════════════════════════════════════
const FB = "https://pixel-game-cd32a-default-rtdb.asia-southeast1.firebasedatabase.app";
const fGet = async p => { try{const r=await fetch(`${FB}/${p}.json`);return r.ok?r.json():null;}catch{return null;} };
const fSet = async(p,d)=>{ try{await fetch(`${FB}/${p}.json`,{method:'PUT',body:JSON.stringify(d)});}catch{} };
const fPatch=async(p,d)=>{ try{await fetch(`${FB}/${p}.json`,{method:'PATCH',body:JSON.stringify(d)});}catch{} };
const fDel  =async p  =>{ try{await fetch(`${FB}/${p}.json`,{method:'DELETE'});}catch{} };
function fListen(p,cb,ms=200){
  let last; const poll=async()=>{const v=await fGet(p);const s=JSON.stringify(v);if(s!==last){last=s;cb(v);}};
  poll(); const id=setInterval(poll,ms); return ()=>clearInterval(id);
}

// ════════════════════════════════════════════
// MAP
// Tile size 32px, 28 cols × 22 rows
// 0 = floor   1 = wall   2 = void (out of bounds)
//
// Layout intent:
//   Attacker spawn  : col 1-2, row 18-19  (bottom-left)
//   Objective/Def spawn : col 22-23, row 4-5  (top-right open area)
//
//   PATH A (wide, southern detour):
//     Goes east along the bottom, then turns north on the right side.
//     Easy to travel but requires approaching the objective from far below.
//
//   PATH B (narrow, northern corridor):
//     A tight 1-tile-wide corridor cutting diagonally through the centre.
//     Dangerous (defender can camp the chokepoint) but gives a direct
//     close-range angle on the objective.
//
//   Centre: a medium open room with a pillar — splits the two routes.
// ════════════════════════════════════════════
const TILE = 32;
const COLS = 28;
const ROWS = 22;

// prettier-ignore
const RAW = [
  "2222222222222222222222222222",  //  0
  "2111111111111111111111111112",  //  1
  "2100000000000000000000000112",  //  2
  "2100000000000000000000000012",  //  3
  "2100000000000000000000000012",  //  4  ← objective area (row 4, col 22)
  "2100001111110000000000000012",  //  5  wall island top
  "2100001000010000000000000012",  //  6
  "2100001000010000000000000012",  //  7
  "2100001111110001111110000012",  //  8  wall island bottom / narrow path wall starts
  "2100000000000001000010000012",  //  9  narrow path (col 13, width 1)
  "2100000000000001000010000012",  // 10
  "2100000000000001000010000012",  // 11
  "2100000000000000111110000012",  // 12  narrow path end, opens to wide area
  "2100000000000000000000000012",  // 13
  "2100000000000000000000000012",  // 14
  "2111110000000000000000000012",  // 15  left barrier (wide path starts below)
  "2100010000000000000000111112",  // 16  right wall
  "2100010000000000000000000012",  // 17
  "2100010000000000000000000012",  // 18
  "2100011111111111111110000012",  // 19  bottom corridor wall
  "2100000000000000000000000012",  // 20
  "2222222222222222222222222222",  // 21
];

const MAP = RAW.map(r=>r.split('').map(Number));

const ATK_SPAWN = {x:2, y:19};
const OBJ_POS   = {x:22, y:4};
const DEF_SPAWN = {x:22, y:4};

function walkable(tx,ty){
  if(tx<0||ty<0||tx>=COLS||ty>=ROWS) return false;
  const c=MAP[ty]?.[tx];
  return c===0;
}

// ════════════════════════════════════════════
// VIEWPORT  13×10 tiles around player
// ════════════════════════════════════════════
const VP_W=13, VP_H=10;
let camX=0, camY=0; // top-left tile (float, smooth)

function moveCamera(fx,fy){
  let tx=fx-VP_W/2+.5, ty=fy-VP_H/2+.5;
  tx=Math.max(0,Math.min(COLS-VP_W,tx));
  ty=Math.max(0,Math.min(ROWS-VP_H,ty));
  camX+=(tx-camX)*.2;
  camY+=(ty-camY)*.2;
}

// ════════════════════════════════════════════
// GAME STATE
// ════════════════════════════════════════════
let myRole=null,myId=null,roomId=null;
let gs=null;   // remote game state
let ls=null;   // local state (authoritative for self)
let unsub=null,loopId=null,srvTimerId=null;

// ── Movement: step queue ──
// We use a "step queue" approach:
// pressing a key instantly queues a step.
// While held, a step repeats every REPEAT_MS.
const REPEAT_FIRST=0;   // first step: immediate (set timer to REPEAT_MS so next fires after delay)
const REPEAT_MS=160;    // ms between repeated steps while held
const heldDir={up:false,down:false,left:false,right:false};
const stepTimer={up:0,down:0,left:0,right:0};
let mobileDir=null;

// Arrows
let arrows=[];
let arrowCD=0;
const ARROW_CD=800;
const ARROW_SPD=9; // tiles/sec
const ARROW_RANGE=7;

const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');

// ════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════
function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function showStatus(m,ms=2200){ const e=document.getElementById('statusMsg'); e.textContent=m; e.classList.add('show'); setTimeout(()=>e.classList.remove('show'),ms); }
function uid(){ return Math.random().toString(36).slice(2,10); }

// ════════════════════════════════════════════
// MATCHMAKING
// ════════════════════════════════════════════
async function chooseRole(role){
  myRole=role; myId=uid();
  const b=document.getElementById('waitBadge');
  b.textContent=role==='attacker'?'⚔ 공격 진영':'🛡 방어 진영';
  b.className='role-badge '+(role==='attacker'?'attacker-color':'defender-color');
  showScreen('waitingScreen');

  const opp=role==='attacker'?'defender':'attacker';
  const lobby=await fGet('lobby');
  let matched=false;

  if(lobby){
    for(const [wId,wd] of Object.entries(lobby)){
      if(wd.role===opp&&wd.status==='waiting'){
        roomId=wd.roomId; matched=true;
        await fPatch(`lobby/${wId}`,{status:'matched'});
        await fPatch(`rooms/${roomId}`,{ [role]:mkP(role), started:true });
        break;
      }
    }
  }
  if(!matched){
    roomId=uid();
    await fSet(`lobby/${myId}`,{role,roomId,status:'waiting'});
    await fSet(`rooms/${roomId}`,{
      attacker:role==='attacker'?mkP('attacker'):null,
      defender:role==='defender'?mkP('defender'):null,
      objective:{hp:5}, timer:150, started:false, winner:null, arrows:[]
    });
    unsub=fListen(`lobby/${myId}`,async d=>{
      if(d&&d.status==='matched'){ if(unsub){unsub();unsub=null;} await fDel(`lobby/${myId}`); startGame(); }
    },400);
    return;
  }
  await fDel(`lobby/${myId}`).catch(()=>{});
  startGame();
}

function mkP(role){
  const sp=role==='attacker'?ATK_SPAWN:DEF_SPAWN;
  return {id:myId,x:sp.x,y:sp.y,dir:'right',alive:true,invincible:false,hp:10,deadTimer:0};
}

async function cancelWaiting(){
  if(unsub){unsub();unsub=null;}
  await fDel(`lobby/${myId}`).catch(()=>{});
  await fDel(`rooms/${roomId}`).catch(()=>{});
  goTitle();
}

// ════════════════════════════════════════════
// GAME START
// ════════════════════════════════════════════
function startGame(){
  ended=false;
  resizeCvs();
  showScreen('gameScreen');
  const hr=document.getElementById('hudRole');
  hr.textContent=myRole==='attacker'?'⚔ 공격 진영':'🛡 방어 진영';
  hr.className='hud-role '+(myRole==='attacker'?'attacker-color':'defender-color');
  if(myRole==='attacker') document.getElementById('fireBtn').classList.add('show');

  // Init local state — each player is authoritative only for THEMSELVES
  const sp=myRole==='attacker'?ATK_SPAWN:DEF_SPAWN;
  ls={
    me:{  x:sp.x,y:sp.y,dir:'right',alive:true,invincible:false,invTimer:0,hp:10,deadTimer:0 },
    opp:{ x:(myRole==='attacker'?DEF_SPAWN:ATK_SPAWN).x, y:(myRole==='attacker'?DEF_SPAWN:ATK_SPAWN).y,
          dir:'right',alive:true,invincible:false,hp:10,deadTimer:0 },
    objHp:5, timer:150,
  };

  // Reset input
  for(const d of['up','down','left','right']){heldDir[d]=false;stepTimer[d]=0;}
  mobileDir=null; arrows=[]; arrowCD=0;

  // Camera
  camX=sp.x-VP_W/2; camY=sp.y-VP_H/2;

  lastT=performance.now();
  unsub=fListen(`rooms/${roomId}`,onServerState,150);
  loopId=requestAnimationFrame(loop);
  if(myRole==='attacker') startSrvTimer();
}

function onServerState(d){
  if(!d||!ls) return;
  gs=d;

  // Sync timer
  if(d.timer!==undefined) ls.timer=d.timer;
  // Sync objective HP
  if(d.objective&&d.objective.hp!==undefined) ls.objHp=d.objective.hp;

  // Sync OPPONENT position/state into ls.opp
  const oppRole=myRole==='attacker'?'defender':'attacker';
  const oppData=d[oppRole];
  if(oppData){
    ls.opp.x=oppData.x??ls.opp.x;
    ls.opp.y=oppData.y??ls.opp.y;
    ls.opp.dir=oppData.dir??ls.opp.dir;
    ls.opp.alive=oppData.alive??true;
    ls.opp.hp=oppData.hp??ls.opp.hp;
    ls.opp.invincible=oppData.invincible??false;
  }

  // Sync MY own state from server only for things I can't compute locally
  // (i.e. if server says I'm dead because of contact — only relevant for attacker)
  if(myRole==='attacker'){
    const sAtk=d.attacker;
    // Check if server killed me (defender stepped on me)
    if(sAtk&&sAtk.alive===false&&ls.me.alive===true){
      ls.me.alive=false;
      ls.me.deadTimer=2000;
    }
  }

  if(d.winner&&d.winner!=='pending'&&!ended) endGame(d.winner);
}

function startSrvTimer(){
  let t=150;
  srvTimerId=setInterval(async()=>{
    if(ended){clearInterval(srvTimerId);return;}
    t-=0.2;
    if(t<=0){ clearInterval(srvTimerId); await fPatch(`rooms/${roomId}`,{timer:0,winner:'defender'}); }
    else await fPatch(`rooms/${roomId}`,{timer:Math.max(0,t)});
  },200);
}

// ════════════════════════════════════════════
// GAME LOOP
// ════════════════════════════════════════════
let lastT=0;
function loop(now){
  const dt=Math.min(now-lastT,80); lastT=now;
  if(!ls){ loopId=requestAnimationFrame(loop); return; }

  tick(dt);
  updateArrows(dt);
  checkHits();
  syncUp();
  drawHUD();
  render();

  loopId=requestAnimationFrame(loop);
}

// ════════════════════════════════════════════
// MOVEMENT TICK
// Fixed step-based: timer accumulates dt, fires a step when threshold met.
// First press fires immediately (timer seeded to REPEAT_MS).
// ════════════════════════════════════════════
function tick(dt){
  const me=ls.me;

  // Arrow cooldown
  if(arrowCD>0) arrowCD=Math.max(0,arrowCD-dt);

  // Invincibility countdown
  if(me.invTimer>0){
    me.invTimer-=dt;
    if(me.invTimer<=0){ me.invincible=false; me.invTimer=0; }
  }

  // Dead countdown → respawn
  if(!me.alive){
    if(me.deadTimer>0){
      me.deadTimer-=dt;
      if(me.deadTimer<=0) doRespawn();
    }
    return; // no movement while dead
  }

  // Step logic: process only the first held direction (priority: up/down/left/right)
  const dirs=['up','down','left','right'];
  for(const dir of dirs){
    const held=heldDir[dir]||(mobileDir===dir);
    if(held){
      stepTimer[dir]+=dt;
      if(stepTimer[dir]>=REPEAT_MS){
        stepTimer[dir]=0;
        doStep(dir);
      }
    } else {
      stepTimer[dir]=0;
    }
  }
}

function doStep(dir){
  const me=ls.me;
  if(!me.alive) return;
  me.dir=dir;
  const dx=dir==='right'?1:dir==='left'?-1:0;
  const dy=dir==='down'?1:dir==='up'?-1:0;
  const nx=me.x+dx, ny=me.y+dy;
  if(walkable(nx,ny)){ me.x=nx; me.y=ny; }
}

// ════════════════════════════════════════════
// ARROWS (attacker only, client-authoritative)
// ════════════════════════════════════════════
function shoot(){
  if(myRole!=='attacker'||arrowCD>0||!ls.me.alive) return;
  arrowCD=ARROW_CD;
  const dm={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
  const [dx,dy]=dm[ls.me.dir]||[1,0];
  arrows.push({x:ls.me.x+.5,y:ls.me.y+.5,dx,dy,dist:0,id:uid()});
}

function updateArrows(dt){
  const step=ARROW_SPD*dt/1000;
  for(const a of arrows){ a.x+=a.dx*step; a.y+=a.dy*step; a.dist+=step; }
  arrows=arrows.filter(a=>a.dist<ARROW_RANGE);
}

// ════════════════════════════════════════════
// COLLISION  (attacker owns all hit detection)
// ════════════════════════════════════════════
function checkHits(){
  if(myRole!=='attacker'||!ls) return;
  const me=ls.me;
  const opp=ls.opp; // defender, synced from server

  // Arrow hits
  const remove=new Set();
  for(const a of arrows){
    const tx=Math.floor(a.x), ty=Math.floor(a.y);

    // Objective
    if(ls.objHp>0&&tx===OBJ_POS.x&&ty===OBJ_POS.y){
      remove.add(a.id);
      const nhp=Math.max(0,ls.objHp-1);
      ls.objHp=nhp;
      if(nhp<=0) fPatch(`rooms/${roomId}`,{'objective/hp':0,winner:'attacker'});
      else       fPatch(`rooms/${roomId}`,{'objective/hp':nhp});
      continue;
    }

    // Defender (only if alive, not dead/tombstone)
    if(opp.alive&&tx===opp.x&&ty===opp.y){
      remove.add(a.id);
      // Decrement defender HP — never reset it here, just reduce
      const nhp=Math.max(0,opp.hp-1);
      opp.hp=nhp;
      if(nhp<=0){
        opp.alive=false; opp.hp=10; opp.deadTimer=2000;
        // Tell server: defender is dead, will respawn in 2s
        fPatch(`rooms/${roomId}`,{'defender/alive':false,'defender/hp':10,'defender/deadTimer':2000});
      } else {
        fPatch(`rooms/${roomId}`,{'defender/hp':nhp});
      }
      continue;
    }
  }
  arrows=arrows.filter(a=>!remove.has(a.id));

  // Defender contact kills attacker
  if(me.alive&&opp.alive&&!me.invincible){
    if(me.x===opp.x&&me.y===opp.y){
      me.alive=false; me.deadTimer=2000;
      fPatch(`rooms/${roomId}`,{'attacker/alive':false,'attacker/deadTimer':2000});
    }
  }
}

// Defender handles its OWN respawn (it listens for deadTimer via server)
// We drive it locally for the defender client:
function checkDefenderRespawn(dt){
  if(myRole!=='defender'||!ls) return;
  const me=ls.me;
  if(!me.alive&&me.deadTimer>0){
    // already handled in tick() → doRespawn
  }
}

function doRespawn(){
  const me=ls.me;
  const sp=myRole==='attacker'?ATK_SPAWN:DEF_SPAWN;
  me.x=sp.x; me.y=sp.y; me.alive=true; me.deadTimer=0;
  if(myRole==='attacker'){
    me.invincible=true; me.invTimer=2000;
    fPatch(`rooms/${roomId}`,{'attacker/alive':true,'attacker/x':sp.x,'attacker/y':sp.y,'attacker/invincible':true,'attacker/hp':10});
  } else {
    me.hp=10;
    fPatch(`rooms/${roomId}`,{'defender/alive':true,'defender/x':sp.x,'defender/y':sp.y,'defender/hp':10});
  }
}

// ════════════════════════════════════════════
// SYNC TO SERVER  (throttled every 4 frames)
// ════════════════════════════════════════════
let _stk=0;
async function syncUp(){
  if(++_stk%4!==0||!roomId) return;
  const me=ls.me;
  const p={[`${myRole}/x`]:me.x,[`${myRole}/y`]:me.y,[`${myRole}/dir`]:me.dir,
           [`${myRole}/alive`]:me.alive,[`${myRole}/invincible`]:!!me.invincible,
           [`${myRole}/hp`]:me.hp};
  if(myRole==='attacker') p.arrows=arrows.map(a=>({x:a.x,y:a.y,dx:a.dx,dy:a.dy,id:a.id}));
  await fPatch(`rooms/${roomId}`,p);
}

// ════════════════════════════════════════════
// HUD
// ════════════════════════════════════════════
function drawHUD(){
  if(!ls) return;
  const s=Math.ceil(ls.timer);
  const m=Math.floor(s/60), sec=s%60;
  const te=document.getElementById('timerEl');
  te.textContent=`${m}:${sec.toString().padStart(2,'0')}`;
  te.className=s<=30?'urgent':'';
  document.getElementById('objHp').textContent=Math.max(0,ls.objHp);
  const defHpVal=myRole==='defender'?ls.me.hp:ls.opp.hp;
  document.getElementById('defHp').textContent=Math.max(0,defHpVal);
  // Cooldown indicator for attacker
  if(myRole==='attacker'){
    const pct=Math.max(0,(1-arrowCD/ARROW_CD)*100);
    const fb=document.getElementById('fireBtn');
    if(pct>=100) fb.classList.add('ready'); else fb.classList.remove('ready');
    const extra=document.getElementById('hudExtra');
    extra.innerHTML=`쿨타임 <span style="color:${pct>=100?'#2ecc71':'#e74c3c'};font-weight:700">${pct>=100?'준비':'재장전'}</span>`;
  }
}

// ════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════
function resizeCvs(){
  const sw=window.innerWidth, sh=window.innerHeight-44;
  const scale=Math.min(sw/(VP_W*TILE), sh/(VP_H*TILE));
  canvas.width=Math.round(VP_W*TILE*scale);
  canvas.height=Math.round(VP_H*TILE*scale);
}

function render(){
  if(!ls) return;
  const me=ls.me;
  moveCamera(me.x,me.y);

  const sx=canvas.width/(VP_W*TILE), sy=canvas.height/(VP_H*TILE);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.scale(sx,sy);
  ctx.translate(-camX*TILE,-camY*TILE);

  const x0=Math.max(0,Math.floor(camX));
  const x1=Math.min(COLS-1,Math.ceil(camX+VP_W));
  const y0=Math.max(0,Math.floor(camY));
  const y1=Math.min(ROWS-1,Math.ceil(camY+VP_H));

  // ── Tiles ──
  for(let ty=y0;ty<=y1;ty++){
    for(let tx=x0;tx<=x1;tx++){
      const c=MAP[ty]?.[tx]??2;
      const px=tx*TILE, py=ty*TILE;
      if(c===2){ ctx.fillStyle='#0d1117'; ctx.fillRect(px,py,TILE,TILE); continue; }
      if(c===1){
        ctx.fillStyle='#363d52'; ctx.fillRect(px,py,TILE,TILE);
        ctx.fillStyle='#454d66'; ctx.fillRect(px,py,TILE,3); ctx.fillRect(px,py,3,TILE);
        ctx.fillStyle='#282e3e'; ctx.fillRect(px,py+TILE-3,TILE,3); ctx.fillRect(px+TILE-3,py,3,TILE);
        continue;
      }
      ctx.fillStyle=(tx+ty)%2===0?'#c4c8d4':'#b8bccb';
      ctx.fillRect(px,py,TILE,TILE);
      ctx.strokeStyle='rgba(0,0,0,.07)'; ctx.lineWidth=.5; ctx.strokeRect(px,py,TILE,TILE);
    }
  }

  // ── Spawn zone ──
  { const px=(ATK_SPAWN.x-1)*TILE,py=(ATK_SPAWN.y-1)*TILE;
    ctx.fillStyle='rgba(200,50,40,.15)'; ctx.fillRect(px,py,TILE*3,TILE*3);
    ctx.strokeStyle='rgba(220,70,50,.45)'; ctx.lineWidth=2; ctx.strokeRect(px,py,TILE*3,TILE*3);
    ctx.fillStyle='rgba(220,90,70,.6)'; ctx.font=`bold ${TILE*.22}px Arial`; ctx.textAlign='center';
    ctx.fillText('SPAWN',px+TILE*1.5,py+TILE*3.3);
  }

  // ── Objective ──
  if(ls.objHp>0){
    const px=OBJ_POS.x*TILE, py=OBJ_POS.y*TILE;
    const pulse=.65+.35*Math.sin(Date.now()*.0035);
    const g=ctx.createRadialGradient(px+TILE/2,py+TILE/2,1,px+TILE/2,py+TILE/2,TILE*1.1);
    g.addColorStop(0,`rgba(70,170,255,${pulse*.75})`);
    g.addColorStop(1,'rgba(70,170,255,0)');
    ctx.fillStyle=g; ctx.fillRect(px-TILE*.55,py-TILE*.55,TILE*2.1,TILE*2.1);
    ctx.fillStyle='#1a5fcc'; ctx.beginPath(); ctx.arc(px+TILE/2,py+TILE/2,TILE*.4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#55aaff'; ctx.beginPath(); ctx.arc(px+TILE/2,py+TILE/2,TILE*.27,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#bbddff'; ctx.beginPath(); ctx.arc(px+TILE/2-3,py+TILE/2-3,TILE*.1,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#111'; ctx.fillRect(px,py+TILE+3,TILE,5);
    ctx.fillStyle='#44aaff'; ctx.fillRect(px,py+TILE+3,TILE*ls.objHp/5,5);
  }

  // ── Characters ──
  // Attacker
  const atk=myRole==='attacker'?ls.me:ls.opp;
  if(atk.alive) drawChar(atk.x,atk.y,atk.dir,'#cc2828',null,null,atk.invincible);

  // Defender
  const def=myRole==='defender'?ls.me:ls.opp;
  if(def.alive) drawChar(def.x,def.y,def.dir,'#1a7acc',def.hp,10,false);
  else drawTomb(def.x,def.y);

  // ── Arrows ──
  const arrs=myRole==='attacker'?arrows:(gs?.arrows??[]);
  for(const a of arrs) drawArrow(a);

  ctx.restore();
}

function drawChar(tx,ty,dir,col,hp,maxHp,inv){
  if(inv&&Math.floor(Date.now()/110)%2===0) return;
  const px=tx*TILE+TILE/2, py=ty*TILE+TILE/2, r=TILE*.37;
  ctx.fillStyle='rgba(0,0,0,.28)';
  ctx.beginPath(); ctx.ellipse(px,py+r*.55,r*.65,r*.2,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=col; ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.2)'; ctx.beginPath(); ctx.arc(px-2,py-2,r*.4,0,Math.PI*2); ctx.fill();
  const dm={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
  const [ddx,ddy]=dm[dir]||[1,0];
  ctx.fillStyle='rgba(255,255,255,.8)';
  ctx.beginPath(); ctx.arc(px+ddx*r*.58,py+ddy*r*.58,TILE*.085,0,Math.PI*2); ctx.fill();
  if(hp!==null){
    ctx.fillStyle='#111'; ctx.fillRect(tx*TILE,ty*TILE-7,TILE,4);
    ctx.fillStyle=hp>maxHp*.45?'#2ecc71':'#e74c3c';
    ctx.fillRect(tx*TILE,ty*TILE-7,TILE*hp/maxHp,4);
  }
}

function drawTomb(tx,ty){
  const px=tx*TILE, py=ty*TILE;
  ctx.fillStyle='#4a5068'; ctx.fillRect(px+TILE*.28,py+TILE*.32,TILE*.44,TILE*.56);
  ctx.beginPath(); ctx.arc(px+TILE*.5,py+TILE*.32,TILE*.22,Math.PI,0); ctx.fill();
  ctx.fillStyle='#7a8098'; ctx.font=`${TILE*.3}px sans-serif`; ctx.textAlign='center';
  ctx.fillText('✝',px+TILE*.5,py+TILE*.63);
}

function drawArrow(a){
  const px=a.x*TILE, py=a.y*TILE;
  ctx.save(); ctx.translate(px,py); ctx.rotate(Math.atan2(a.dy,a.dx));
  ctx.fillStyle='#e8b820'; ctx.fillRect(-TILE*.25,-2,TILE*.4,4);
  ctx.fillStyle='#cc3010'; ctx.beginPath(); ctx.moveTo(TILE*.15,-4); ctx.lineTo(TILE*.28,0); ctx.lineTo(TILE*.15,4); ctx.fill();
  ctx.restore();
}

// ════════════════════════════════════════════
// END GAME
// ════════════════════════════════════════════
let ended=false;
function endGame(w){
  if(ended) return; ended=true;
  cancelAnimationFrame(loopId); clearInterval(srvTimerId);
  if(unsub){unsub();unsub=null;}
  const el=document.getElementById('resultTitle');
  el.textContent=w==='attacker'?'⚔ 공격 승리!':'🛡 방어 승리!';
  el.style.color=w==='attacker'?'#e74c3c':'#3498db';
  showScreen('resultScreen');
}

function goTitle(){
  ended=false; ls=null; gs=null; myRole=null; myId=null; roomId=null; arrows=[];
  clearInterval(srvTimerId);
  document.getElementById('fireBtn').classList.remove('show','ready');
  showScreen('titleScreen');
}

// ════════════════════════════════════════════
// KEYBOARD — press fires immediately, hold repeats
// ════════════════════════════════════════════
const KM={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',
          w:'up',s:'down',a:'left',d:'right'};

document.addEventListener('keydown',e=>{
  const dir=KM[e.key];
  if(dir){
    e.preventDefault();
    if(!heldDir[dir]){
      heldDir[dir]=true;
      stepTimer[dir]=REPEAT_MS; // seed so first repeat fires immediately next tick
      doStep(dir);              // immediate step on key press
    }
  }
  if(e.code==='Space'){e.preventDefault();shoot();}
});
document.addEventListener('keyup',e=>{
  const dir=KM[e.key];
  if(dir){ heldDir[dir]=false; stepTimer[dir]=0; }
});

// ════════════════════════════════════════════
// MOBILE D-PAD
// ════════════════════════════════════════════
document.querySelectorAll('.dpad-btn').forEach(btn=>{
  const dir=btn.dataset.dir;
  btn.addEventListener('touchstart',e=>{
    e.preventDefault();
    mobileDir=dir; btn.classList.add('pressed');
    stepTimer[dir]=REPEAT_MS; doStep(dir); // immediate
  },{passive:false});
  btn.addEventListener('touchend',e=>{
    e.preventDefault();
    mobileDir=null; btn.classList.remove('pressed'); stepTimer[dir]=0;
  },{passive:false});
});

document.getElementById('fireBtn').addEventListener('touchstart',e=>{e.preventDefault();shoot();},{passive:false});
document.getElementById('fireBtn').addEventListener('click',shoot);

window.addEventListener('resize',()=>{ if(document.getElementById('gameScreen').classList.contains('active')) resizeCvs(); });
</script>
